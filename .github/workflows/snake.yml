name: Generate Cyberpunk Contribution Snake

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate raw contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Shiyang-Zhao
          outputs: |
            dist/raw-snake.svg?color_snake=#F4E152&color_dots=#24151A,#5C2026,#B52D36,#B8DDE2,#F4E152

      - name: Wrap snake in a full-width cyberpunk panel
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          raw_path = Path("dist/raw-snake.svg")
          raw_bytes = raw_path.read_bytes()
          encoded = base64.b64encode(raw_bytes).decode("ascii")

          wrapped_svg = f'''<svg xmlns="http://www.w3.org/2000/svg"
               xmlns:xlink="http://www.w3.org/1999/xlink"
               width="900"
               height="180"
               viewBox="0 0 900 180"
               fill="none">

            <defs>
              <pattern id="cyberScanlines" width="4" height="4" patternUnits="userSpaceOnUse">
                <rect width="4" height="1" fill="#F4E152" opacity="0.035"/>
              </pattern>
            </defs>

            <rect width="900" height="180" rx="4" fill="#151117"/>
            <rect width="900" height="180" rx="4" fill="url(#cyberScanlines)"/>

            <image
              x="0"
              y="0"
              width="900"
              height="180"
              preserveAspectRatio="none"
              xlink:href="data:image/svg+xml;base64,{encoded}"
            />

            <rect
              x="1"
              y="1"
              width="898"
              height="178"
              rx="4"
              fill="none"
              stroke="#5C2026"
              stroke-width="2"
            />
          </svg>'''

          Path("dist/github-contribution-grid-snake.svg").write_text(
              wrapped_svg,
              encoding="utf-8"
          )
          PY

      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
