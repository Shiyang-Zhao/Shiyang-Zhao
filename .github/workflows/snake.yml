name: Generate Cyberpunk Contribution Snake

on:
  schedule:
    # Runs every day at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Shiyang-Zhao
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#F4E152&color_dots=#24151A,#5C2026,#B52D36,#B8DDE2,#F4E152

      - name: Add cyberpunk background and frame
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("dist/github-contribution-grid-snake.svg")
          svg = path.read_text(encoding="utf-8")

          svg_start = svg.find("<svg")
          svg_open_end = svg.find(">", svg_start)

          if svg_start == -1 or svg_open_end == -1:
              raise RuntimeError("Could not find the opening <svg> element.")

          background = '''
          <defs>
            <pattern
              id="cyberScanlines"
              width="4"
              height="4"
              patternUnits="userSpaceOnUse"
            >
              <rect
                width="4"
                height="1"
                fill="#F4E152"
                opacity="0.035"
              />
            </pattern>
          </defs>

          <rect
            width="100%"
            height="100%"
            fill="#151117"
          />

          <rect
            width="100%"
            height="100%"
            fill="url(#cyberScanlines)"
          />

          <rect
            x="1"
            y="1"
            width="99.7%"
            height="98.5%"
            rx="4"
            fill="none"
            stroke="#5C2026"
            stroke-width="2"
          />
          '''

          svg = (
              svg[: svg_open_end + 1]
              + background
              + svg[svg_open_end + 1 :]
          )

          path.write_text(svg, encoding="utf-8")
          PY

      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
